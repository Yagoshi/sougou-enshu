{% extends 'store/base.html' %}
{% load static %}

{% block title %}管理者ログイン | SOUGOU STORE{% endblock %}

{% block content %}
<div class="form-wrap">
    <h2 class="form-title">管理者ログイン<span class="admin-badge" style="vertical-align:middle; margin-left:8px;">ADMIN</span></h2>

    {% if error_message %}
    <div class="form-error">{{ error_message }}</div>
    {% endif %}

    <form method="POST" style="display:flex; flex-direction:column; gap:14px;">
        {% csrf_token %}
        <div class="form-group">
            <label class="form-label">管理者ID</label>
            <input type="text" name="admin_id" required class="form-input">
        </div>
        <div class="form-group">
            <label class="form-label">パスワード</label>
            <input type="password" name="password" required class="form-input">
        </div>
        <button type="submit" class="btn-primary" style="width:100%; padding:12px;">ログインする</button>
    </form>

    <div class="form-links">
        <a href="{% url 'store:main' %}" class="muted">← 一般トップページへ</a>
    </div>
</div>
{% endblock %}
