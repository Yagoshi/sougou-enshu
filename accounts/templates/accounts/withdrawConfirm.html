{% extends 'store/base.html' %}
{% load static %}

{% block title %}退会確認 | SOUGOU STORE{% endblock %}

{% block content %}
<div class="form-wrap">
    <h2 class="form-title">退会確認</h2>

    <div style="background:#fff0f0; border:1px solid #ffcccc; border-radius:var(--radius-lg); padding:20px; margin-bottom:24px;">
        <h3 style="color:#c0392b; font-size:15px; margin-bottom:10px;">本当に退会しますか？</h3>
        <p style="font-size:13px; color:var(--text2); line-height:1.7;">この操作は取り消すことができません。退会すると、会員情報およびカートの内容がすべて削除されます。</p>
    </div>

    <form method="POST">
        {% csrf_token %}
        <button type="submit" class="btn-danger" style="width:100%; padding:12px;">退会する</button>
    </form>

    <div class="form-links">
        <a href="{% url 'accounts:userInfo' %}" class="muted">← マイページに戻る</a>
    </div>
</div>
{% endblock %}
