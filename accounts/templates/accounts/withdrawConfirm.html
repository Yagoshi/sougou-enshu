{% load static %}
<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>退会確認</title>
    <link rel='stylesheet' type='text/css' href='{% static "accounts/css/style.css" %}' />
</head>
<body class="narrow">
    <h1>退会確認</h1>

    <div class="card danger">
        <h2 style="color: #e2433a; margin-top: 0; border: none; padding: 0;">本当に退会しますか？</h2>
        <p>この操作は取り消すことができません。</p>
        <p>※退会すると、会員情報および現在のショッピングカートの中身がすべて削除されます。</p>
    </div>

    <form method="POST">
        {% csrf_token %}
        <button type="submit" class="btn-danger">退会する</button>
    </form>

    <a href="{% url 'accounts:userInfo' %}" class="back-link">← 会員情報確認に戻る</a>
</body>
</html>
