{% extends 'store/base.html' %}
{% load static %}

{% block title %}会員登録確認 | SOUGOU STORE{% endblock %}

{% block content %}
<div class="form-wrap">
    <h2 class="form-title">会員登録（確認）</h2>
    <p style="font-size:13px; color:var(--text2); margin-bottom:20px;">以下の内容で登録します。よろしいですか？</p>

    <div class="confirm-card">
        <div class="confirm-row"><span class="confirm-label">会員ID</span><span class="confirm-value">{{ data.user_id }}</span></div>
        <div class="confirm-row"><span class="confirm-label">パスワード</span><span class="confirm-value">（非表示）</span></div>
        <div class="confirm-row"><span class="confirm-label">お名前</span><span class="confirm-value">{{ data.name }}</span></div>
        <div class="confirm-row"><span class="confirm-label">ご住所</span><span class="confirm-value">{{ data.address }}</span></div>
    </div>

    <form method="POST">
        {% csrf_token %}
        <button type="submit" class="btn-primary" style="width:100%; padding:12px;">登録する</button>
    </form>

    <div class="form-links">
        <a href="{% url 'accounts:registerUser' %}" class="muted">← 入力画面に戻って修正する</a>
    </div>
</div>
{% endblock %}
