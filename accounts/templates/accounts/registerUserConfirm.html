{% load static %}
<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>会員登録確認</title>
    <link rel='stylesheet' type='text/css' href='{% static "accounts/css/style.css" %}' />
</head>
<body class="narrow">
    <h1>会員登録 (確認)</h1>
    <p>以下の内容で登録するけどいいよね？</p>

    <div class="card">
        <ul>
            <li>会員ID: {{ data.user_id }}</li>
            <li>パスワード: (表示されないよ)</li>
            <li>お名前: {{ data.name }}</li>
            <li>ご住所: {{ data.address }}</li>
        </ul>
    </div>

    <form method="POST">
        {% csrf_token %}
        <button type="submit">登録する</button>
    </form>

    <a href="{% url 'accounts:registerUser' %}" class="back-link">← 入力画面に戻って修正したい人はこちらへカモンぬ</a>
</body>
</html>
