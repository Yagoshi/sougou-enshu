<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>会員登録確認</title>
</head>
<body>
    <h1>会員登録 (確認)</h1>
    <p>以下の内容で登録します。よろしいですか？</p>
    
    <ul>
        <li>会員ID: {{ data.user_id }}</li>
        <li>パスワード: (表示されません)</li>
        <li>お名前: {{ data.name }}</li>
        <li>ご住所: {{ data.address }}</li>
    </ul>

    <form method="POST">
        {% csrf_token %}
        <button type="submit">登録する</button>
    </form>
    
    <br>
    <a href="{% url 'accounts:registerUser' %}">入力画面に戻って修正する</a>
</body>
</html>
