{% extends 'store/base.html' %}
{% load static %}

{% block title %}会員情報更新 | SOUGOU STORE{% endblock %}

{% block content %}
<div class="form-wrap">
    <h2 class="form-title">会員情報の更新</h2>

    <form method="POST" style="display:flex; flex-direction:column; gap:14px;">
        {% csrf_token %}
        {% for field in form %}
        <div class="form-group">
            <label class="form-label">{{ field.label }}</label>
            {{ field }}
            {% if field.errors %}
            <p style="color:#c0392b; font-size:12px; margin-top:4px;">{{ field.errors|join:", " }}</p>
            {% endif %}
        </div>
        {% endfor %}
        <button type="submit" class="btn-primary" style="width:100%; padding:12px;">確認画面へ</button>
    </form>

    <div class="form-links">
        <a href="{% url 'accounts:userInfo' %}" class="muted">← マイページに戻る</a>
    </div>
</div>
{% endblock %}
