{% load static %}
<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ログイン</title>
    <link rel='stylesheet' type='text/css' href='{% static "accounts/css/style.css" %}' />
</head>
<body class="narrow">
    <h3>ログインして下さい。</h3>

    {% if error_message %}
        <p class="error">{{ error_message }}</p>
    {% endif %}

    <div class="card">
        <form action="{% url 'accounts:login' %}" method='POST'>
            {% csrf_token %}
            <table class="center">
                <tr>
                    <th>会員ID:</th>
                    <td><input type="text" name="user_id" class="id" required></td>
                </tr>
                <tr>
                    <th>パスワード:</th>
                    <td><input type="password" name="password" class="password" required></td>
                </tr>
                <tr>
                    <td colspan="2" style="text-align: center;">
                        <input type="submit" value="ログイン">
                    </td>
                </tr>
            </table>
        </form>
    </div>

    <p>
        <a href="{% url 'accounts:registerUser' %}">会員登録</a><br>
        <a href="{% url 'store:main' %}">トップページに戻る</a>
    </p>
</body>
</html>
