<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ログイン</title>
</head>
<body>
    <h1>会員ログイン</h1>
    
    {% if error_message %}
        <p style="color: red; font-weight: bold;">{{ error_message }}</p>
    {% endif %}

    <form method="POST">
        {% csrf_token %}
        <div style="margin-bottom: 10px;">
            <label>会員ID:</label>
            <input type="text" name="user_id" required>
        </div>
        <div style="margin-bottom: 10px;">
            <label>パスワード:</label>
            <input type="password" name="password" required>
        </div>
        <button type="submit">ログインする</button>
    </form>
    
    <br>
    <a href="{% url 'accounts:registerUser' %}">新規会員登録はこちら</a><br>
    <a href="{% url 'store:main' %}">トップページに戻る</a>
</body>
</html>
