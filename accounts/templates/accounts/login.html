{% extends 'store/base.html' %}
{% load static %}

{% block title %}ログイン | SOUGOU STORE{% endblock %}

{% block content %}
<div class="form-wrap">
    <h2 class="form-title">ログイン</h2>

    {% if error_message %}
    <div class="form-error">{{ error_message }}</div>
    {% endif %}

    <form action="{% url 'accounts:login' %}" method="POST" style="display:flex; flex-direction:column; gap:14px;">
        {% csrf_token %}
        <div class="form-group">
            <label class="form-label">会員ID</label>
            <input type="text" name="user_id" required class="form-input">
        </div>
        <div class="form-group">
            <label class="form-label">パスワード</label>
            <input type="password" name="password" required class="form-input">
        </div>
        <button type="submit" class="btn-primary" style="width:100%; padding:12px;">ログイン</button>
    </form>

    <div class="form-links">
        <a href="{% url 'accounts:registerUser' %}">→ 会員登録はこちら</a>
        <a href="{% url 'store:main' %}" class="muted">← トップページに戻る</a>
    </div>
</div>
{% endblock %}
