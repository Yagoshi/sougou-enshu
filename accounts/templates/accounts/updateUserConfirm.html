<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>会員情報更新確認</title>
</head>
<body>
    <h1>会員情報更新 (確認)</h1>
    <p>以下の内容で情報を更新します。よろしいですか？</p>
    
    <div style="border: 1px solid #ccc; padding: 20px; margin-bottom: 20px;">
        <p><strong>新しいお名前:</strong> {{ data.name }}</p>
        <p><strong>新しいご住所:</strong> {{ data.address }}</p>
    </div>

    <form method="POST">
        {% csrf_token %}
        <button type="submit">この内容で更新する</button>
    </form>
    
    <br>
    <a href="{% url 'accounts:updateUser' %}">入力画面に戻って修正する</a>
</body>
</html>
