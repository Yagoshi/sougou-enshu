{% load static %}
<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>会員情報更新確認</title>
    <link rel='stylesheet' type='text/css' href='{% static "accounts/css/style.css" %}' />
</head>
<body class="narrow">
    <h1>会員情報更新 (確認)</h1>
    <p>以下の内容で情報を更新します。よろしいですか？</p>

    <div class="card">
        <p><strong>新しいお名前:</strong> {{ data.name }}</p>
        <p><strong>新しいご住所:</strong> {{ data.address }}</p>
    </div>

    <form method="POST">
        {% csrf_token %}
        <button type="submit">この内容で更新する</button>
    </form>

    <a href="{% url 'accounts:updateUser' %}" class="back-link">← 入力画面に戻って修正する</a>
</body>
</html>
