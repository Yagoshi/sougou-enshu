{% load static %}
<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>{{ title }}</title>
    <link rel='stylesheet' type='text/css' href='{% static "accounts/css/style.css" %}' />
</head>
<body class="narrow">

    <h1>{{ title }}</h1>

    <div class="card">
        <form method="POST">
            {% csrf_token %}
            {{ form.as_p }}

            <hr style="border: 0; border-top: 1px solid #eef0f5; margin: 20px 0;">

            <button type="submit" class="btn-success">この内容で保存する</button>
            <a href="{% url 'store:adminMain' %}" class="back-link" style="margin-left: 15px;">キャンセルして戻る</a>
        </form>
    </div>

</body>
</html>
