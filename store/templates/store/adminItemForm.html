<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>{{ title }}</title>
</head>
<body style="background-color: #f4f4f9; font-family: sans-serif; padding: 20px;">

    <div style="max-width: 600px; margin: 30px auto; padding: 20px; background-color: white; border: 1px solid #ccc; box-shadow: 2px 2px 5px rgba(0,0,0,0.1);">
        <h1 style="border-bottom: 2px solid #333; padding-bottom: 10px; color: #333;">{{ title }}</h1>
        
        <form method="POST" style="margin-top: 20px;">
            {% csrf_token %}
            
            <div style="margin-bottom: 15px;">
                {{ form.as_p }}
            </div>
            
            <hr style="border: 0; border-top: 1px solid #ccc; margin: 20px 0;">
            
            <button type="submit" style="background-color: #5cb85c; color: white; border: none; padding: 10px 20px; font-weight: bold; cursor: pointer; border-radius: 4px;">この内容で保存する</button>
            <a href="{% url 'store:adminMain' %}" style="display: inline-block; margin-left: 15px; color: #666; text-decoration: none;">キャンセルして戻る</a>
        </form>
    </div>

</body>
</html>
