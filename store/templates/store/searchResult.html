{% load static %}
<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>検索結果</title>
    <link rel='stylesheet' type='text/css' href='{% static "accounts/css/style.css" %}' />
</head>
<body>
    <h1>検索結果</h1>

    {% if keyword %}
        <p>「{{ keyword }}」の検索結果</p>
    {% endif %}

    <table class="center">
        <tr>
            <th>商品名</th>
            <th>メーカー</th>
            <th>価格</th>
            <th>カテゴリ</th>
        </tr>
        {% for item in results %}
            <tr>
                <td><a href="{% url 'store:itemDetail' item.item_id %}">{{ item.name }}</a></td>
                <td>{{ item.manufacturer }}</td>
                <td>{{ item.price }}円</td>
                <td>{{ item.category.name }}</td>
            </tr>
        {% empty %}
            <tr>
                <td colspan="4">条件に一致する商品は見つかりませんでした。</td>
            </tr>
        {% endfor %}
    </table>

    <a href="{% url 'store:main' %}" class="back-link">← 商品検索画面に戻る</a>
</body>
</html>
